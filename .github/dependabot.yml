version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
